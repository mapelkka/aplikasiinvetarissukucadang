<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stok Suku Cadang Bengkel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Sistem Inventaris Bengkel</h1>
            <input type="text" id="searchInput" placeholder="Cari nama atau kode barang..." onkeyup="filterData()">
        </header>
    <div class="input-section">
    <h3>Tambah Suku Cadang Baru</h3>
    <div class="form-grid">
        <input type="text" id="inKode" placeholder="Kode Barang">
        <input type="text" id="inNama" placeholder="Nama Suku Cadang">
        <input type="number" id="inStok" placeholder="Jumlah Stok">
        <input type="text" id="inHarga" placeholder="Harga (Contoh: 50.000)">
    </div>
    <button onclick="tambahData()" id="btnSimpan">Simpan ke Spreadsheet</button>
</div>
<hr>
        <main>
            <table id="inventoryTable">
                <thead>
                    <tr>
                        <th>Kode</th>
                        <th>Nama Suku Cadang</th>
                        <th>Stok</th>
                        <th>Harga</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <!-- Data akan muncul di sini melalui JS -->
                </tbody>
            </table>
            <div id="loading">Memuat data suku cadang...</div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventaris Bengkel Modern</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Sistem Inventaris Bengkel</h1>
        </div>

        <div class="card">
            <h2>Tambah Barang Baru</h2>
            <div class="form-grid">
                <div class="input-group">
                    <label for="inKode">Kode</label>
                    <input type="text" id="inKode" placeholder="Contoh: OLI-01">
                </div>
                <div class="input-group">
                    <label for="inNama">Nama Suku Cadang</label>
                    <input type="text" id="inNama" placeholder="Nama barang">
                </div>
                <div class="input-group">
                    <label for="inStok">Stok</label>
                    <input type="number" id="inStok" placeholder="0">
                </div>
                <div class="input-group">
                    <label for="inHarga">Harga</label>
                    <input type="number" id="inHarga" placeholder="Rp">
                </div>
            </div>
            <button id="btnSimpan" onclick="tambahData()">Simpan ke Spreadsheet</button>
        </div>

        <div class="card">
            <div class="table-header">
                <h2>Stok Saat Ini</h2>
                <input type="text" id="cariBarang" onkeyup="filterData()" placeholder="Cari nama barang...">
            </div>
            
            <div id="loading" class="status-msg">Memuat data dari Google Sheets...</div>
            
            <div class="table-container">
                <table id="mainTable">
                    <thead>
                        <tr>
                            <th>Kode</th>
                            <th>Nama Suku Cadang</th>
                            <th>Stok</th>
                            <th>Harga</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>

<div class="container">
    <div class="card">
        <h2>Tambah Barang</h2>
        <div class="form-grid">
            <input type="text" id="inKode" placeholder="Kode">
            <input type="text" id="inNama" placeholder="Nama Suku Cadang">
            <input type="number" id="inStok" placeholder="Stok">
            <input type="number" id="inHarga" placeholder="Harga">
        </div>
        <button id="btnSimpan" onclick="tambahData()">Simpan ke Spreadsheet</button>
    </div>

    <div class="card">
        <h2>Inventaris Saat Ini</h2>
        <div id="loading">Memuat...</div>
        <table>
            <thead>
                <tr><th>Kode</th><th>Nama</th><th>Stok</th><th>Harga</th></tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>
